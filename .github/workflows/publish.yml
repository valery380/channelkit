name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires npm >= 11.5.1 (newer than what Node 20 ships).
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build

      - name: Check if version exists on npm
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view channelkit version 2>/dev/null || echo "none")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $CURRENT already published — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing $CURRENT (npm has $PUBLISHED)"
          fi

      # Auth comes from GitHub OIDC via the Trusted Publisher configured on npm —
      # no NPM_TOKEN secret. Provenance is attached automatically.
      - name: Publish
        if: steps.check.outputs.skip != 'true'
        run: npm publish
